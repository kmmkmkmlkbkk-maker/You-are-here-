<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Younis Digital Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&family=Tajawal:wght@300;500;800&display=swap');

        :root {
            --fire-glow: #ff4d00;
            --dark-bg: #0a0a0a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.5);
        }

        /* Fixed Card (No Rotation) */
        .card-static {
            width: 350px;
            height: 210px;
            border-radius: 18px;
            border: 1px solid rgba(255, 77, 0, 0.4);
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9), inset 0 0 20px rgba(255, 77, 0, 0.15);
            background: linear-gradient(135deg, rgba(15,15,15,0.85) 0%, rgba(35,15,5,0.7) 100%);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 15px;
            position: relative;
        }

        .profile-img {
            width: 125px;
            height: 100%;
            object-fit: cover;
            border-radius: 14px;
            box-shadow: 0 0 20px rgba(255, 77, 0, 0.4);
            mask-image: linear-gradient(to right, black 75%, transparent 100%);
        }

        .card-content {
            flex: 1;
            padding-right: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .name-title {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 2.3rem;
            color: white;
            text-shadow: 0 0 12px var(--fire-glow);
            margin-bottom: 2px;
        }

        .social-sidebar {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-left: 5px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 25px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 77, 0, 0.2);
        }

        .social-sidebar i {
            font-size: 1.3rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #ddd;
            cursor: pointer;
        }

        .social-sidebar i:hover {
            color: var(--fire-glow);
            transform: scale(1.3) rotate(5deg);
        }

        /* Vault Overlay */
        .vault-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
        }

        .pin-display {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
        }

        .pin-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid var(--fire-glow);
            transition: all 0.3s ease;
        }

        .pin-dot.active {
            background: var(--fire-glow);
            box-shadow: 0 0 18px var(--fire-glow);
            transform: scale(1.2);
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }

        .key {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .key:active {
            background: var(--fire-glow);
            transform: scale(0.85);
            border-color: transparent;
        }

        /* Vault View */
        .vault-content {
            width: 92%;
            max-width: 480px;
            height: 85vh;
            background: #0d0d0d;
            border-radius: 30px;
            border: 1px solid rgba(255, 77, 0, 0.5);
            padding: 25px;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .account-list-container {
            flex: 1;
            overflow-y: auto;
            margin: 15px 0;
            padding-left: 5px;
        }

        .account-card {
            background: rgba(255,255,255,0.04);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 12px;
            border-right: 5px solid var(--fire-glow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
        }

        .account-card:hover {
            background: rgba(255,255,255,0.08);
        }

        .copy-btn {
            background: var(--fire-glow);
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .copy-btn:hover {
            filter: brightness(1.2);
        }

        /* Intro Screen */
        .entrance-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glitch-text {
            font-size: 3.5rem;
            font-family: 'Reem Kufi';
            color: var(--fire-glow);
            text-shadow: 0 0 20px var(--fire-glow);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--fire-glow); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Entrance Screen -->
    <div id="entrance" class="entrance-screen">
        <div class="glitch-text">يونس</div>
    </div>

    <!-- Background Video (Updated) -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="https://b.top4top.io/m_3720u3vo50.mp4" type="video/mp4">
    </video>

    <!-- Main Card -->
    <div class="card-static">
        <img src="https://e.top4top.io/p_3720kj9sq0.png" class="profile-img" alt="Younis">
        
        <div class="card-content">
            <div class="name-title">يونس</div>
            <p class="text-[10px] text-gray-400 opacity-60 tracking-widest">DIGITAL VAULT CARD</p>
            
            <div class="mt-5 flex items-center gap-3">
                <i class="fas fa-barcode text-2xl opacity-40"></i>
                <div class="h-[1px] flex-1 bg-gradient-to-r from-orange-600/50 to-transparent"></div>
            </div>
        </div>

        <div class="social-sidebar">
            <i class="fab fa-instagram" onclick="window.open('https://instagram.com/7_ro7_', '_blank')"></i>
            <i class="fab fa-snapchat" onclick="window.open('https://www.snapchat.com/add/yon_1i', '_blank')"></i>
            <i class="fab fa-tiktok" onclick="window.open('https://tiktok.com/@_77xx_1', '_blank')"></i>
            <i class="fab fa-whatsapp" onclick="window.open('https://wa.me/9647851214176', '_blank')"></i>
            <i class="fas fa-vault text-orange-500 mt-2" onclick="openVault()"></i>
        </div>
    </div>

    <!-- Vault Screen -->
    <div id="vaultOverlay" class="vault-overlay">
        <div id="pinSection">
            <h2 class="text-xl mb-10 text-center text-orange-500 font-bold">الخزينة الرقمية المحمية</h2>
            <div class="pin-display">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>
            <div class="keypad">
                <div class="key" onclick="pressKey('1')">1</div>
                <div class="key" onclick="pressKey('2')">2</div>
                <div class="key" onclick="pressKey('3')">3</div>
                <div class="key" onclick="pressKey('4')">4</div>
                <div class="key" onclick="pressKey('5')">5</div>
                <div class="key" onclick="pressKey('6')">6</div>
                <div class="key" onclick="pressKey('7')">7</div>
                <div class="key" onclick="pressKey('8')">8</div>
                <div class="key" onclick="pressKey('9')">9</div>
                <div class="key"></div>
                <div class="key" onclick="pressKey('0')">0</div>
                <div class="key" onclick="resetPin()"><i class="fas fa-backspace"></i></div>
            </div>
            <button class="mt-10 text-white/30 block mx-auto hover:text-white transition-colors" onclick="closeVault()">إغلاق</button>
        </div>

        <!-- Inside Vault -->
        <div id="vaultContent" class="vault-content">
            <div class="flex justify-between items-center mb-6 border-b border-orange-900/50 pb-4">
                <div>
                    <h2 class="text-xl font-bold">بياناتك السرية</h2>
                    <p class="text-[10px] text-gray-500">مشفرة ومحفوظة للأبد</p>
                </div>
                <i class="fas fa-times cursor-pointer text-xl hover:text-orange-500" onclick="closeVault()"></i>
            </div>
            
            <div class="account-list-container" id="accountsList">
                <div class="text-center py-10 opacity-30">جاري مزامنة السحابة...</div>
            </div>

            <button class="w-full bg-orange-600/10 border border-orange-600/50 py-4 rounded-2xl mt-2 hover:bg-orange-600 transition-all font-bold" onclick="showAddForm()">
                <i class="fas fa-plus-circle ml-2"></i> إضافة حساب للخزنة
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-orange-600 text-white px-8 py-3 rounded-full shadow-2xl opacity-0 transition-all z-[9999] pointer-events-none font-bold">
        تم النسخ بنجاح
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyA262s_QVEBEuGmht94eXO1wEDNkBPojCE",
            authDomain: "green-db03c.firebaseapp.com",
            projectId: "green-db03c",
            storageBucket: "green-db03c.firebasestorage.app",
            messagingSenderId: "205487738976",
            appId: "1:205487738976:web:d58ec5c46144a0a875b305"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "younis-master-card";

        let currentPin = "";
        const correctPin = "9966";

        window.addEventListener('load', () => {
            // Entrance handling
            setTimeout(() => {
                const ent = document.getElementById('entrance');
                ent.style.transition = 'opacity 1s ease';
                ent.style.opacity = '0';
                setTimeout(() => ent.style.display = 'none', 1000);
            }, 2000);
            
            auth.signInAnonymously().catch(e => console.error("Auth:", e));
        });

        function openVault() {
            document.getElementById('vaultOverlay').style.display = 'flex';
            resetPin();
        }

        function closeVault() {
            document.getElementById('vaultOverlay').style.display = 'none';
            document.getElementById('vaultContent').style.display = 'none';
            document.getElementById('pinSection').style.display = 'block';
        }

        function pressKey(num) {
            if (currentPin.length < 4) {
                currentPin += num;
                updatePinDisplay();
                if (currentPin.length === 4) validatePin();
            }
        }

        function updatePinDisplay() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, i) => {
                if (i < currentPin.length) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        function resetPin() {
            currentPin = "";
            updatePinDisplay();
        }

        function validatePin() {
            if (currentPin === correctPin) {
                document.getElementById('pinSection').style.display = 'none';
                document.getElementById('vaultContent').style.display = 'flex';
                loadVaultData();
            } else {
                showToast("الرمز غير صحيح");
                setTimeout(resetPin, 500);
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = '1';
            t.style.bottom = '20px';
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.bottom = '10px';
            }, 2500);
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
        }

        function copyFormatted(email, pass) {
            const formattedText = `الحساب: ${email}\nكلمة السر: ${pass}`;
            copyToClipboard(formattedText);
            showToast("تم النسخ بنجاح");
        }

        async function loadVaultData() {
            const user = auth.currentUser;
            if (!user) return;

            const list = document.getElementById('accountsList');
            list.innerHTML = '<div class="text-center py-10 opacity-40">جاري تحميل خزنتك...</div>';

            try {
                const snapshot = await db.collection('artifacts').doc(appId)
                    .collection('users').doc(user.uid).collection('vault')
                    .orderBy('timestamp', 'desc').get();
                
                list.innerHTML = "";
                if (snapshot.empty) {
                    list.innerHTML = '<div class="text-center py-20 opacity-20">خزنتك لا تحتوي على حسابات بعد</div>';
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = "account-card";
                    card.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-orange-600/20 flex items-center justify-center">
                                <i class="fas fa-key text-orange-500 text-sm"></i>
                            </div>
                            <div>
                                <div class="text-sm font-bold text-white">${data.platform}</div>
                                <div class="text-[10px] text-gray-500 truncate w-32">${data.email}</div>
                            </div>
                        </div>
                        <div class="copy-btn" onclick="copyFormatted('${data.email}', '${data.password}')">نسخ البيانات</div>
                    `;
                    list.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                list.innerHTML = "تعذر تحميل البيانات السحابية";
            }
        }

        async function showAddForm() {
            const platform = prompt("اسم التطبيق أو المنصة:");
            if (!platform) return;
            const email = prompt("البريد الإلكتروني أو رقم الهاتف:");
            const password = prompt("كلمة السر:");

            if (email && password) {
                const user = auth.currentUser;
                if (!user) return;
                
                try {
                    await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('vault').add({
                        platform,
                        email,
                        password,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    loadVaultData();
                    showToast("تم الحفظ في السحابة");
                } catch (e) {
                    alert("خطأ في الاتصال، حاول لاحقاً");
                }
            }
        }
    </script>
</body>
</html>
